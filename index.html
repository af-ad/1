<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SOOP</title>
    <script>
        const playList = [
            {
                "listID": 958629,
                "vid":[
                    174531075,174531079,174531081,174531077,174531089,
                    174531083,174531093,174531085,174531087,174531091
                ]
            },{
                "listID": 958631,
                "vid":[
                    174531075,174531079,174531081,174531077,174531089,
                    174531083,174531093,174531085,174531087,174531091
                ]
            },{
                "listID": 959219,
                "vid":[
                    174649387,174649391,174649393,174649423,174649429,
                    174649427,174649425,174649421,174649385,174649389
                ]
            },{
                "listID": 959217,
                "vid":[
                    174649387,174649391,174649393,174649423,174649429,
                    174649427,174649425,174649421,174649385,174649389
                ]
            }
            
        ]

        function gen(){
            const seed = seedGen(playList.length);
            const pid = maxIdx(seed);
            const seed2 = seedGen(playList[pid]["vid"].length)
            const vid = maxIdx(seed2);
            return `https://vod.sooplive.co.kr/player/${playList[pid]["vid"][vid]}/playlist/${playList[pid]["listID"]}`
        }

        function seedGen(num=1){
            let array = new Uint32Array(num)
            return window.crypto.getRandomValues(array)
        }
        function maxIdx(array){
            let idx=0;
            let max=array[0];
            array.forEach((element,index) => {
                if(max<element){
                    max=element;
                    idx=index;
                }
            });
            return idx;
        }

        window.onload = function()
        {
            window.location.href = gen();
        };
    </script>
</head>
